version: 2

project_name: dukascopy-go

before:
  hooks:
    - go test ./...

builds:
  - id: dukascopy-go
    main: ./cmd/dukascopy-go
    binary: dukascopy-go
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/Nosvemos/dukascopy-go/internal/buildinfo.Version={{ .Version }}
      - -X github.com/Nosvemos/dukascopy-go/internal/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/Nosvemos/dukascopy-go/internal/buildinfo.Date={{ .Date }}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: git

release:
  github:
    owner: Nosvemos
    name: dukascopy-go
